<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Stack with Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrapper">

  <!-- Left Controls -->
  <div class="controls">
    <button id="openForm">+</button>
    <button id="up" type="button">↑</button>
    <button id="down" type="button">↓</button>
  </div>

  <!-- Card Stack -->
  <div class="card-stack">
    <div class="card"> </div>

    <div class="card active">
      <div class="avatar">
        <img src="https://plus.unsplash.com/premium_photo-1766341848857-5853b6bd7c47?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDl8dG93SlpGc2twR2d8fGVufDB8fHx8fA%3D%3D" alt="">
      </div>

      <div class="details">
        <h2>Fatima Uma</h2>

        <div class="row">
          <span class="label">Home town</span>
          <span class="value">Singapore</span>
        </div>

        <div class="row">
          <span class="label">Bookings</span>
          <span class="value">3 times</span>
        </div>

        <div class="actions">
          <button class="call">📞 Call</button>
          <button class="message">Message</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Color Selector -->
  <div class="colors">
    <span class="dot black"></span>
    <span class="dot purple"></span>
    <span class="dot brown"></span>
    <span class="dot teal"></span>
  </div>

</div>

<!-- Modal Form -->
<form  method="get">
<div class="modal" id="formModal">
  <div class="modal-content">
    <h3>New Call</h3>

    <label>Image URL</label>
    <input type="text" placeholder="https//:jjsjsj">

    <label>Full Name</label>
    <input type="text" placeholder="Enter full name">

    <label>Home Town</label>
    <input type="text" placeholder="Enter home town">

    <label>Purpose</label>
    <input type="text" placeholder="e.g. Quick appointment note">

    
    <div class="radio-group">
      <label><input type="radio" name="category" value="Emergency"> Emergency</label>
      <label><input type="radio" name="category" value="Important"> Important</label>
      <label><input type="radio" name="category" value="Urgent"> Urgent</label>
      <label><input type="radio" name="category" value="No Rush"> No Rush</label>
    </div>

    <button type="submit" class="create">Create</button>
    <button type="button" class="close-btn" id="closeForm">Close</button>


  </div>
</div>
</form>
<script src="sipt.js"></script>
</body>
</html>
